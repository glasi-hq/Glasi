<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glasi | Dispatch</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0F1F3D;
      --navy-mid: #162842;
      --ice: #A8D8EA;
      --ice-dim: rgba(168,216,234,0.12);
      --white: #FAFAFA;
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
      --grey: #64748b;
      --border: rgba(168,216,234,0.15);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Raleway', sans-serif; background: var(--navy); color: var(--white); min-height: 100vh; }

    #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: var(--navy-mid); border: 1px solid var(--border); border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 380px; text-align: center; }
    .wordmark { font-family: 'Raleway', sans-serif; font-weight: 400; font-size: 26px; letter-spacing: 8px; color: var(--white); border: 1.5px solid var(--white); border-radius: 6px; padding: 8px 20px; display: inline-block; margin-bottom: 8px; }
    .login-sub { font-size: 9px; letter-spacing: 3px; color: var(--ice); text-transform: uppercase; margin-bottom: 32px; }
    .field { width: 100%; background: var(--navy); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; color: var(--white); font-family: 'JetBrains Mono', monospace; font-size: 13px; margin-bottom: 10px; outline: none; transition: border-color 0.2s; }
    .field:focus { border-color: var(--ice); }
    .field option { background: var(--navy-mid); }
    .login-btn { width: 100%; background: var(--ice); color: var(--navy); border: none; border-radius: 10px; padding: 13px; font-family: 'Raleway', sans-serif; font-weight: 600; font-size: 14px; cursor: pointer; transition: opacity 0.2s; margin-top: 4px; }
    .login-btn:hover { opacity: 0.85; }
    .err { color: var(--red); font-size: 12px; margin-top: 8px; }

    #dashboard { display: none; }
    .header { background: var(--navy-mid); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .header-title { font-size: 10px; letter-spacing: 3px; color: var(--ice); text-transform: uppercase; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .date-tag { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--grey); }
    .ghost-btn { background: transparent; border: 1px solid var(--border); color: var(--grey); border-radius: 8px; padding: 6px 14px; font-family: 'Raleway', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.2s; }
    .ghost-btn:hover { border-color: var(--ice); color: var(--ice); }

    #zone-select { padding: 48px 24px; max-width: 680px; margin: 0 auto; }
    .zone-select-title { font-size: 22px; font-weight: 500; margin-bottom: 6px; }
    .zone-select-sub { font-size: 12px; color: var(--grey); margin-bottom: 32px; font-family: 'JetBrains Mono', monospace; }
    .zones-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .zone-card { background: var(--navy-mid); border: 1px solid var(--border); border-radius: 16px; padding: 24px; cursor: pointer; transition: all 0.2s; text-align: left; width: 100%; font-family: 'Raleway', sans-serif; color: var(--white); }
    .zone-card:hover { border-color: var(--ice); background: var(--ice-dim); }
    .zone-card-name { font-size: 16px; font-weight: 500; margin-bottom: 4px; }
    .zone-card-meta { font-size: 11px; color: var(--grey); font-family: 'JetBrains Mono', monospace; }

    #dispatch-view { display: none; }
    .main { display: grid; grid-template-columns: 280px 1fr 320px; height: calc(100vh - 57px); overflow: hidden; }

    .left-panel { background: var(--navy-mid); border-right: 1px solid var(--border); overflow-y: auto; padding: 20px; }
    .panel-heading { font-size: 9px; letter-spacing: 3px; color: var(--ice); text-transform: uppercase; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .small-btn { background: var(--ice-dim); border: 1px solid rgba(168,216,234,0.25); color: var(--ice); border-radius: 6px; padding: 4px 10px; font-family: 'Raleway', sans-serif; font-size: 10px; cursor: pointer; transition: all 0.2s; }
    .small-btn:hover { background: rgba(168,216,234,0.2); }
    .worker-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 6px; }
    .worker-row.on-shift { border-color: var(--amber); opacity: 0.75; }
    .worker-row.completed { border-color: rgba(34,197,94,0.3); opacity: 0.5; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: var(--green); }
    .worker-row.on-shift .dot { background: var(--amber); }
    .worker-row.completed .dot { background: var(--grey); }
    .wi { flex: 1; min-width: 0; }
    .wn { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .wm { font-size: 10px; color: var(--grey); font-family: 'JetBrains Mono', monospace; }
    .wtag { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; color: var(--green); }
    .worker-row.on-shift .wtag { color: var(--amber); }
    .worker-row.completed .wtag { color: var(--grey); }

    .centre { overflow-y: auto; padding: 24px; }
    .centre-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; }
    .centre-zone { font-size: 20px; font-weight: 500; }
    .centre-sub { font-size: 11px; color: var(--grey); font-family: 'JetBrains Mono', monospace; margin-top: 2px; }
    .primary-btn { background: var(--ice); color: var(--navy); border: none; border-radius: 10px; padding: 10px 20px; font-family: 'Raleway', sans-serif; font-weight: 600; font-size: 13px; cursor: pointer; transition: opacity 0.2s; }
    .primary-btn:hover { opacity: 0.85; }
    .section-label { font-size: 9px; letter-spacing: 3px; color: var(--ice); text-transform: uppercase; margin-bottom: 12px; margin-top: 8px; }

    .shift-card { background: var(--navy-mid); border: 1px solid var(--border); border-radius: 16px; padding: 18px 20px; margin-bottom: 12px; }
    .shift-card.active { border-color: var(--amber); }
    .shift-card.completed { border-color: rgba(34,197,94,0.3); opacity: 0.75; }
    .sc-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
    .sc-bar { font-size: 15px; font-weight: 500; }
    .sc-worker { font-size: 12px; color: var(--ice); font-family: 'JetBrains Mono', monospace; margin-top: 2px; }
    .badge { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; font-family: 'JetBrains Mono', monospace; }
    .b-active { background: rgba(245,158,11,0.15); color: var(--amber); }
    .b-done { background: rgba(34,197,94,0.15); color: var(--green); }

    .timeline { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }
    .ts { background: var(--navy); border-radius: 10px; padding: 10px; text-align: center; border: 1px solid transparent; }
    .ts.done { border-color: rgba(34,197,94,0.3); }
    .tl { font-size: 9px; letter-spacing: 1px; color: var(--grey); text-transform: uppercase; font-family: 'JetBrains Mono', monospace; margin-bottom: 4px; }
    .tv { font-size: 13px; font-family: 'JetBrains Mono', monospace; color: var(--white); }
    .ts.done .tv { color: var(--green); }

    .code-block { background: var(--navy); border: 1px solid var(--ice); border-radius: 10px; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .cl { font-size: 9px; letter-spacing: 2px; color: var(--ice); text-transform: uppercase; font-family: 'JetBrains Mono', monospace; margin-bottom: 3px; }
    .cv { font-size: 26px; font-weight: 600; font-family: 'JetBrains Mono', monospace; color: var(--ice); letter-spacing: 6px; }
    .copy-btn { background: var(--ice-dim); border: 1px solid rgba(168,216,234,0.3); color: var(--ice); border-radius: 6px; padding: 6px 14px; font-size: 11px; cursor: pointer; font-family: 'Raleway', sans-serif; transition: all 0.2s; }
    .copy-btn:hover { background: rgba(168,216,234,0.2); }

    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .act-btn { background: var(--navy); border: 1px solid var(--border); color: var(--white); border-radius: 8px; padding: 8px 14px; font-family: 'Raleway', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.2s; }
    .act-btn:hover { border-color: var(--ice); color: var(--ice); }
    .act-btn.hi { background: var(--ice); color: var(--navy); border-color: var(--ice); font-weight: 600; }
    .act-btn.hi:hover { opacity: 0.85; }

    .right-panel { background: var(--navy-mid); border-left: 1px solid var(--border); overflow-y: auto; padding: 20px; }
    .log-item { background: var(--navy); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; border-left: 3px solid var(--border); }
    .log-item.t-dispatch { border-left-color: var(--ice); }
    .log-item.t-clockin { border-left-color: var(--amber); }
    .log-item.t-complete { border-left-color: var(--green); }
    .log-item.t-worker { border-left-color: var(--grey); }
    .lt { font-size: 10px; color: var(--grey); font-family: 'JetBrains Mono', monospace; margin-bottom: 3px; }
    .lx { font-size: 12px; line-height: 1.5; }

    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: none; align-items: center; justify-content: center; z-index: 100; }
    .overlay.open { display: flex; }
    .modal { background: var(--navy-mid); border: 1px solid var(--border); border-radius: 20px; padding: 32px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
    .modal-title { font-size: 17px; font-weight: 600; margin-bottom: 20px; }
    .modal label { display: block; font-size: 10px; letter-spacing: 1px; color: var(--ice); text-transform: uppercase; margin-bottom: 6px; margin-top: 16px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
    .cancel-btn { flex: 1; background: transparent; border: 1px solid var(--border); color: var(--grey); border-radius: 10px; padding: 11px; font-family: 'Raleway', sans-serif; font-size: 13px; cursor: pointer; }
    .cancel-btn:hover { border-color: var(--ice); color: var(--ice); }
    .confirm-btn { flex: 2; background: var(--ice); color: var(--navy); border: none; border-radius: 10px; padding: 11px; font-family: 'Raleway', sans-serif; font-weight: 600; font-size: 13px; cursor: pointer; }
    .confirm-btn:hover { opacity: 0.85; }

    .pick-list { max-height: 220px; overflow-y: auto; border: 1px solid var(--border); border-radius: 10px; }
    .pick-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; cursor: pointer; transition: background 0.15s; border-bottom: 1px solid var(--border); }
    .pick-item:last-child { border-bottom: none; }
    .pick-item:hover { background: var(--ice-dim); }
    .pick-item input[type=checkbox] { width: auto; accent-color: var(--ice); }
    .pick-name { font-size: 13px; flex: 1; }
    .pick-post { font-size: 10px; color: var(--grey); font-family: 'JetBrains Mono', monospace; }

    .star-row { display: flex; gap: 8px; margin-top: 6px; }
    .star { font-size: 28px; cursor: pointer; color: var(--grey); transition: color 0.15s; line-height: 1; }
    .star.on { color: var(--amber); }

    .empty { text-align: center; padding: 40px 16px; color: var(--grey); font-size: 13px; line-height: 1.7; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="wordmark">GLASI</div>
    <p class="login-sub">Dispatch Portal</p>
    <input class="field" type="email" id="l-email" placeholder="Email" />
    <input class="field" type="password" id="l-pass" placeholder="Password" />
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <p class="err" id="l-err"></p>
  </div>
</div>

<div id="dashboard">
  <div class="header">
    <div class="header-left">
      <div class="wordmark" style="font-size:16px;letter-spacing:5px;padding:4px 12px;">GLASI</div>
      <div class="header-title">Dispatch</div>
    </div>
    <div class="header-right">
      <div class="date-tag" id="hdr-date"></div>
      <button class="ghost-btn" onclick="backToZones()">Change Zone</button>
      <button class="ghost-btn" onclick="doLogout()">Sign Out</button>
    </div>
  </div>

  <div id="zone-select">
    <div class="zone-select-title">Select your zone</div>
    <div class="zone-select-sub">Choose the zone you are dispatching for this session</div>
    <div class="zones-grid" id="zones-grid"></div>
  </div>

  <div id="dispatch-view">
    <div class="main">
      <div class="left-panel">
        <div class="panel-heading">
          <span>Workers in Room</span>
          <button class="small-btn" onclick="openOv('add-workers')">+ Add</button>
        </div>
        <div id="workers-list"></div>
      </div>

      <div class="centre">
        <div class="centre-top">
          <div>
            <div class="centre-zone" id="zone-name-display"></div>
            <div class="centre-sub" id="zone-date-display"></div>
          </div>
          <button class="primary-btn" onclick="openOv('new-request')">+ Log Request</button>
        </div>
        <div class="section-label">Active Shifts</div>
        <div id="active-shifts"></div>
        <div class="section-label" style="margin-top:20px;">Completed Shifts</div>
        <div id="completed-shifts"></div>
      </div>

      <div class="right-panel">
        <div class="panel-heading">Event Log</div>
        <div id="event-log"></div>
      </div>
    </div>
  </div>
</div>

<!-- Add Workers -->
<div class="overlay" id="ov-add-workers">
  <div class="modal">
    <div class="modal-title">Add Workers to Room</div>
    <label>Select from vetted workers</label>
    <div class="pick-list" id="worker-pick-list"></div>
    <div class="modal-actions">
      <button class="cancel-btn" onclick="closeOv('add-workers')">Cancel</button>
      <button class="confirm-btn" onclick="confirmAddWorkers()">Add to Room</button>
    </div>
  </div>
</div>

<!-- New Request -->
<div class="overlay" id="ov-new-request">
  <div class="modal">
    <div class="modal-title">Log Shift Request</div>
    <label>Bar Name</label>
    <input class="field" type="text" id="req-bar" placeholder="e.g. Dancing Man Brewery" />
    <label>Contact Name</label>
    <input class="field" type="text" id="req-contact" placeholder="e.g. Aidan" />
    <label>Contact Phone</label>
    <input class="field" type="text" id="req-phone" placeholder="07..." />
    <label>How did they request?</label>
    <select class="field" id="req-method">
      <option value="WhatsApp">WhatsApp</option>
      <option value="Phone call">Phone call</option>
      <option value="In person">In person</option>
    </select>
    <label>Request Time</label>
    <input class="field" type="time" id="req-time" />
    <label>Shift Length</label>
    <select class="field" id="req-length">
      <option value="1">1 hour</option>
      <option value="1.5">1.5 hours</option>
      <option value="2">2 hours</option>
      <option value="2.5">2.5 hours</option>
      <option value="3" selected>3 hours</option>
      <option value="3.5">3.5 hours</option>
      <option value="4">4 hours</option>
    </select>
    <label>Worker Assigned</label>
    <select class="field" id="req-worker"></select>
    <label>Accepted Time</label>
    <input class="field" type="time" id="req-accepted" />
    <div class="modal-actions">
      <button class="cancel-btn" onclick="closeOv('new-request')">Cancel</button>
      <button class="confirm-btn" onclick="confirmRequest()">Log Shift</button>
    </div>
  </div>
</div>

<!-- Clock In -->
<div class="overlay" id="ov-clockin">
  <div class="modal">
    <div class="modal-title">Confirm Clock In</div>
    <label>Clock In Time</label>
    <input class="field" type="time" id="ci-time" />
    <div class="modal-actions">
      <button class="cancel-btn" onclick="closeOv('clockin')">Cancel</button>
      <button class="confirm-btn" onclick="confirmClockIn()">Confirm</button>
    </div>
  </div>
</div>

<!-- Complete -->
<div class="overlay" id="ov-complete">
  <div class="modal">
    <div class="modal-title">Complete Shift</div>
    <label>Clock Out Time</label>
    <input class="field" type="time" id="co-time" />
    <label>Bar Rating</label>
    <div class="star-row" id="star-row">
      <span class="star" onclick="setStar(1)">★</span>
      <span class="star" onclick="setStar(2)">★</span>
      <span class="star" onclick="setStar(3)">★</span>
      <span class="star" onclick="setStar(4)">★</span>
      <span class="star" onclick="setStar(5)">★</span>
    </div>
    <label>Notes</label>
    <textarea class="field" id="co-notes" rows="3" placeholder="Any feedback from the bar..."></textarea>
    <div class="modal-actions">
      <button class="cancel-btn" onclick="closeOv('complete')">Cancel</button>
      <button class="confirm-btn" onclick="confirmComplete()">Complete Shift</button>
    </div>
  </div>
</div>

<script>
const SB = "https://hweytbyrqvjsviydmacv.supabase.co";
const KEY = "sb_publishable_Qt-BL3-Qyb1cEBJ1ScDYSw_kNdxfYXs";
const H = { 'Content-Type':'application/json', 'apikey':KEY, 'Authorization':`Bearer ${KEY}` };

const ZONES = [
  { id:'southampton-city-centre', name:'Southampton City Centre', meta:'SO14 · Dancing Man, Smokin Barrels etc', postcodes:['SO14','SO15'] },
  { id:'southampton-north', name:'Southampton North', meta:'SO16 · Bassett, Shirley area', postcodes:['SO16','SO17'] },
  { id:'southampton-east', name:'Southampton East', meta:'SO17-18 · Portswood, Bitterne area', postcodes:['SO17','SO18','SO19'] },
  { id:'portsmouth-city-centre', name:'Portsmouth City Centre', meta:'PO1 · Gunwharf, Old Portsmouth area', postcodes:['PO1','PO2','PO3','PO4','PO5'] }
];

let zone = null, allW = [], sessW = [], shifts = [], activeSid = null, starRating = 0, log = [];

const gen4 = () => String(Math.floor(1000 + Math.random() * 9000));
const nowT = () => { const n=new Date(); return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`; };
const fmtT = iso => iso ? new Date(iso).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) : '--:--';
const today = () => new Date().toISOString().split('T')[0];
const toISO = t => new Date(`${today()}T${t}`).toISOString();

async function sbGet(t,q='') { const r=await fetch(`${SB}/rest/v1/${t}${q}`,{headers:H}); return r.json(); }
async function sbPost(t,b) { const r=await fetch(`${SB}/rest/v1/${t}`,{method:'POST',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(b)}); return r.json(); }
async function sbPatch(t,q,b) { const r=await fetch(`${SB}/rest/v1/${t}${q}`,{method:'PATCH',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(b)}); return r.json(); }

function doLogin() {
  const e=document.getElementById('l-email').value.trim();
  const p=document.getElementById('l-pass').value;
  if(e==='sam@glasi.co.uk' && p==='Sponger64112!') {
    document.getElementById('login-screen').style.display='none';
    document.getElementById('dashboard').style.display='block';
    document.getElementById('hdr-date').textContent=new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
    renderZones();
    sbGet('applications','?age_group=not.is.null&order=name.asc&select=name,phone,postcode_full,email').then(d=>allW=Array.isArray(d)?d:[]);
  } else { document.getElementById('l-err').textContent='Incorrect email or password.'; }
}
document.getElementById('l-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
function doLogout() { document.getElementById('login-screen').style.display='flex'; document.getElementById('dashboard').style.display='none'; zone=null; }

function renderZones() {
  document.getElementById('zone-select').style.display='block';
  document.getElementById('dispatch-view').style.display='none';
  document.getElementById('zones-grid').innerHTML = ZONES.map(z=>`
    <button class="zone-card" onclick="selectZone('${z.id}','${z.name}')">
      <div class="zone-card-name">${z.name}</div>
      <div class="zone-card-meta">${z.meta}</div>
    </button>`).join('');
}

async function selectZone(id,name) {
  zone={id,name};
  document.getElementById('zone-select').style.display='none';
  document.getElementById('dispatch-view').style.display='block';
  document.getElementById('zone-name-display').textContent=name;
  document.getElementById('zone-date-display').textContent=new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
  await loadSessW(); await loadShifts();
}
function backToZones() { renderZones(); }

async function loadSessW() {
  const result=await sbGet('session_workers',`?zone_id=eq.${zone.id}&session_date=eq.${today()}&order=created_at.asc`);
  sessW=Array.isArray(result)?result:[];
  renderWorkers();
}

function renderWorkers() {
  const el=document.getElementById('workers-list');
  if(!sessW.length){el.innerHTML='<div class="empty">No workers added.<br>Click + Add to build your room.</div>';return;}
  el.innerHTML=sessW.map(w=>{
    const c=w.status==='on-shift'?'on-shift':w.status==='completed'?'completed':'';
    const t=w.status==='on-shift'?'On Shift':w.status==='completed'?'Done':'Available';
    return `<div class="worker-row ${c}"><div class="dot"></div><div class="wi"><div class="wn">${w.worker_name}</div><div class="wm">${w.worker_phone||''}</div></div><div class="wtag">${t}</div></div>`;
  }).join('');
}

function openOv(name) {
  if(name==='add-workers') {
    const ex=Array.isArray(sessW)?sessW.map(w=>w.worker_name):[];
    const zoneData=ZONES.find(z=>z.id===zone.id);
    const prefixes=zoneData?.postcodes||[];
    const av=allW.filter(w=>{
      if(ex.includes(w.name)) return false;
      if(!w.postcode_full) return false;
      const pc=w.postcode_full.trim().toUpperCase();
      return prefixes.some(p=>pc.startsWith(p));
    });
    document.getElementById('worker-pick-list').innerHTML=av.length?av.map(w=>`
      <label class="pick-item">
        <input type="checkbox" value="${w.email}" data-name="${w.name}" data-phone="${w.phone||''}" />
        <span class="pick-name">${w.name}</span>
        <span class="pick-post">${w.postcode_full||''}</span>
      </label>`).join(''):'<div style="padding:14px;color:var(--grey);font-size:13px;">No workers found in this zone.</div>';
  }
  if(name==='new-request') {
    document.getElementById('req-time').value=nowT();
    document.getElementById('req-accepted').value=nowT();
    const av=sessW.filter(w=>w.status==='available');
    document.getElementById('req-worker').innerHTML=av.length?av.map(w=>`<option value="${w.id}">${w.worker_name}</option>`).join(''):'<option>No available workers</option>';
  }
  if(name==='clockin'){document.getElementById('ci-time').value=nowT();}
  if(name==='complete'){document.getElementById('co-time').value=nowT();starRating=0;document.querySelectorAll('.star').forEach(s=>s.classList.remove('on'));}
  document.getElementById(`ov-${name}`).classList.add('open');
}
function closeOv(name){document.getElementById(`ov-${name}`).classList.remove('open');}
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));

async function confirmAddWorkers() {
  const cbs=document.querySelectorAll('#worker-pick-list input:checked');
  for(const cb of cbs){
    await sbPost('session_workers',{zone_id:zone.id,worker_name:cb.dataset.name,worker_phone:cb.dataset.phone,session_date:today(),status:'available'});
    addLog('worker',`${cb.dataset.name} added to room`);
  }
  closeOv('add-workers'); loadSessW();
}

async function loadShifts() {
  const result=await sbGet('shifts',`?zoom_room=eq.${encodeURIComponent(zone.id)}&order=created_at.desc`);
  shifts=Array.isArray(result)?result:[];
  renderShifts(); renderLog();
}

function renderShifts() {
  const active=shifts.filter(s=>s.status==='active');
  const done=shifts.filter(s=>s.status==='completed');
  document.getElementById('active-shifts').innerHTML=active.length?active.map(shiftCard).join(''):'<div class="empty">No active shifts.<br>Click Log Request when a bar gets in touch.</div>';
  document.getElementById('completed-shifts').innerHTML=done.length?done.map(shiftCard).join(''):'<div style="color:var(--grey);font-size:13px;padding:8px 0;">None yet.</div>';
}

function shiftCard(s) {
  const isActive=s.status==='active';
  const badge=isActive?'<span class="badge b-active">On Shift</span>':'<span class="badge b-done">Completed</span>';
  const timeline=`<div class="timeline">
    <div class="ts ${s.requested_at?'done':''}"><div class="tl">Requested</div><div class="tv">${fmtT(s.requested_at)}</div></div>
    <div class="ts ${s.accepted_at?'done':''}"><div class="tl">Accepted</div><div class="tv">${fmtT(s.accepted_at)}</div></div>
    <div class="ts ${s.clock_in_confirmed_at?'done':''}"><div class="tl">Clock In</div><div class="tv">${fmtT(s.clock_in_confirmed_at)}</div></div>
    <div class="ts ${s.clock_out_confirmed_at?'done':''}"><div class="tl">Clock Out</div><div class="tv">${fmtT(s.clock_out_confirmed_at)}</div></div>
  </div>`;
  const codeBlock=isActive?`<div class="code-block"><div><div class="cl">Clock In Code</div><div class="cv">${s.clock_in_code}</div></div><button class="copy-btn" onclick="navigator.clipboard.writeText('${s.clock_in_code}').then(()=>{this.textContent='Copied!';setTimeout(()=>this.textContent='Copy',1500)})">Copy</button></div>`:'';
  const actions=isActive?`<div class="actions">
    ${!s.clock_in_confirmed_at?`<button class="act-btn hi" onclick="activeSid='${s.id}';openOv('clockin')">Confirm Clock In</button>`:''}
    <button class="act-btn hi" onclick="activeSid='${s.id}';openOv('complete')">Complete Shift</button>
  </div>`:`<div style="font-size:12px;color:var(--grey);">${s.bar_rating?'★'.repeat(s.bar_rating)+'☆'.repeat(5-s.bar_rating)+' · ':''} ${s.shift_length_hours}hr · ${s.request_method||''}${s.notes?'<br>'+s.notes:''}</div>`;
  return `<div class="shift-card ${isActive?'active':'completed'}">
    <div class="sc-top"><div><div class="sc-bar">${s.bar_name}</div><div class="sc-worker">${s.worker_name} · ${s.shift_length_hours}hr · asked for ${s.contact_name||'N/A'}</div></div>${badge}</div>
    ${timeline}${codeBlock}${actions}
  </div>`;
}

async function confirmRequest() {
  const bar=document.getElementById('req-bar').value.trim();
  const contact=document.getElementById('req-contact').value.trim();
  const phone=document.getElementById('req-phone').value.trim();
  const method=document.getElementById('req-method').value;
  const rt=document.getElementById('req-time').value;
  const length=document.getElementById('req-length').value;
  const wid=document.getElementById('req-worker').value;
  const at=document.getElementById('req-accepted').value;
  if(!bar||!wid)return;
  const w=sessW.find(x=>x.id==wid);
  const code=gen4();
  await sbPost('shifts',{bar_name:bar,contact_name:contact||null,worker_name:w?.worker_name,worker_phone:w?.worker_phone,zoom_room:zone.id,shift_length_hours:parseFloat(length),requested_at:rt?toISO(rt):null,accepted_at:at?toISO(at):null,clock_in_code:code,request_method:method,status:'active'});
  await sbPatch('session_workers',`?id=eq.${wid}`,{status:'on-shift'});
  addLog('dispatch',`${w?.worker_name} dispatched to ${bar} · Code: ${code}`);
  closeOv('new-request'); loadSessW(); loadShifts();
}

async function confirmClockIn() {
  const t=document.getElementById('ci-time').value;
  await sbPatch('shifts',`?id=eq.${activeSid}`,{clock_in_confirmed_at:t?toISO(t):null});
  const s=shifts.find(x=>x.id==activeSid);
  addLog('clockin',`${s?.worker_name} clocked in at ${t}`);
  closeOv('clockin'); loadShifts();
}

async function confirmComplete() {
  const t=document.getElementById('co-time').value;
  const notes=document.getElementById('co-notes').value.trim();
  const s=shifts.find(x=>x.id==activeSid);
  await sbPatch('shifts',`?id=eq.${activeSid}`,{clock_out_confirmed_at:t?toISO(t):null,bar_rating:starRating||null,notes:notes||null,status:'completed'});
  const w=sessW.find(x=>x.worker_name===s?.worker_name);
  if(w) await sbPatch('session_workers',`?id=eq.${w.id}`,{status:'completed'});
  addLog('complete',`Shift complete · ${s?.worker_name} · ${s?.bar_name}${starRating?' · '+'★'.repeat(starRating):''}`);
  closeOv('complete'); loadSessW(); loadShifts();
}

function setStar(n){starRating=n;document.querySelectorAll('.star').forEach((s,i)=>s.classList.toggle('on',i<n));}

function addLog(type,text){log.unshift({type,text,time:new Date()});renderLog();}
function renderLog(){
  const el=document.getElementById('event-log');
  if(!log.length){el.innerHTML='<div style="color:var(--grey);font-size:12px;">Events will appear here.</div>';return;}
  el.innerHTML=log.map(e=>`<div class="log-item t-${e.type}"><div class="lt">${e.time.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}</div><div class="lx">${e.text}</div></div>`).join('');
}
</script>
</body>
</html>
